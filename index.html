<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBKART — Yerel İşletme Önerileri</title>
    <meta name="description" content="Adrasan, Antalya ve çevresindeki güvenilir yerel işletme önerileri.">
    
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <style>
        :root {
            --bg-color: #aaae9d;
            --accent-color: #da7452;
            --header-bg: #c1c4b1;
            --text-dark: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Special Elite', system-ui, monospace;
            background-color: var(--bg-color);
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            color: var(--text-dark);
            line-height: 1.6;
        }
        
        header {
            background-color: var(--header-bg);
            border-bottom: 6px solid var(--accent-color);
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo { 
            font-size: 2.4rem; 
            letter-spacing: 3px; 
        }
        
        .search-container {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 5%;
            text-align: center;
        }
        
        #searchInput {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.3rem;
            border: 4px solid #000;
            font-family: 'Special Elite', monospace;
            background: white;
            margin-bottom: 2rem;
        }
        
        #searchResults {
            margin-top: 1rem;
            display: grid;
            gap: 1.5rem;
        }
        
        .result-card {
            background: #c1c4b1;
            border: 4px solid #000;
            padding: 1.8rem;
            box-shadow: 8px 8px 0 #000;
            text-align: left;
        }
        
        .result-card h3 {
            color: var(--accent-color);
            margin-bottom: 0.6rem;
        }
        
        .result-card a {
            color: var(--accent-color);
            text-decoration: underline;
        }
        
        .no-results {
            text-align: center;
            padding: 3rem 1rem;
            color: #555;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">WEBKART</div>
    </header>

    <div class="search-container">
        <h1 style="font-size: 3rem; margin-bottom: 1.5rem;">YEREL İŞLETME ÖNERİLERİ</h1>
        <p style="font-size: 1.4rem; margin-bottom: 2rem; color: #555;">
            İşletme adı, adres, tür veya anahtar kelime girin
        </p>
        
        <input type="text" id="searchInput" 
               placeholder="Örn: Engin Kaptan, tekne turu, Adrasan, koltuk yıkama..." 
               autocomplete="off">
        
        <div id="searchResults"></div>
    </div>

    <script>
        // Firma Veritabanı
        const businesses = [
            {
                title: "Adrasan Engin Kaptan",
                type: "Günlük Tekne Turu",
                location: "Adrasan, Kumluca / Antalya",
                description: "Suluada ve gizli koylar için güvenli ve konforlu tekne turları",
                url: "adrasan-engin-kaptan.html"
            },
            {
                title: "Güçlü Koltuk Yıkama",
                type: "Koltuk / Yatak Yıkama",
                location: "Muratpaşa, Konyaaltı, Kepez, Döşemealtı, Serik, Aksu, Kemer",
                description: "Kadın ekibiyle ve doğal şampuan garantisiyle Antalya'nın her yerine profesyonel yerinde temizlik hizmeti",
                url: "https://www.antalyakoltukyikamaci.com.tr"
            }
            // Yeni firmaları buraya aynı formatta ekleyin
        ];

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('searchResults');

        function renderResults(filtered) {
            resultsContainer.innerHTML = '';
            
            if (filtered.length === 0) {
                resultsContainer.innerHTML = `<div class="no-results">Sonuç bulunamadı.<br>Farklı bir kelime deneyin.</div>`;
                return;
            }
            
            filtered.forEach(business => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <h3>${business.title}</h3>
                    <p><strong>${business.type}</strong> — ${business.location}</p>
                    <p>${business.description}</p>
                    <p><a href="${business.url}" target="_blank">→ Detaylı Sayfayı Gör</a></p>
                `;
                resultsContainer.appendChild(card);
            });
        }

        // Arama fonksiyonu
        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase().trim();
            
            if (query.length < 2) {
                resultsContainer.innerHTML = '';
                return;
            }
            
            const filtered = businesses.filter(b => 
                b.title.toLowerCase().includes(query) ||
                b.type.toLowerCase().includes(query) ||
                b.location.toLowerCase().includes(query) ||
                b.description.toLowerCase().includes(query)
            );
            
            renderResults(filtered);
        });
    </script>

    <footer>
        <p>© 2026 WEBKART.COM.TR — Yerel İşletme Önerileri</p>
        <p style="margin-top: 15px; font-size: 0.85rem;">Bu sayfa Webkart tarafından bağımsız olarak hazırlanmıştır.</p>
    </footer>

</body>
</html>
